# Podsync configuration
# Managed by Podsync UI

[server]
port = 8080
hostname = "http://localhost:8080"

[storage]
  [storage.local]
  data_dir = "/app/data"

[tokens]
youtube = "YOUR_YOUTUBE_API_KEY"

[feeds]
  [feeds.example]
  url = "https://www.youtube.com/channel/UCExample"
  page_size = 50
  update_period = "12h"
  quality = "high"
  format = "audio"

  [feeds.example.custom]
  title = "Example Podcast"
  description = "An example podcast feed"

[downloader]
self_update = true
timeout = 15
